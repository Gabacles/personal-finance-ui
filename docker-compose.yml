services:
  personal-finance-ui:
    image: ${APP_IMAGE:-personal-finance-ui:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - EXTERNAL_API_URL
    container_name: personal-finance-ui
    env_file:
      - ${APP_ENV_FILE:-.env.docker}
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - personal-finance-network

  # Descomente se tiver um backend API
